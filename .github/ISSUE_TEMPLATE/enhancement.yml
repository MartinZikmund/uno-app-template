name: Enhancement
description: Suggest an improvement to existing functionality
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like improved?
      description: Describe the enhancement you have in mind.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Why / use case
      description: Why would this improvement be useful?

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other information or screenshots.
